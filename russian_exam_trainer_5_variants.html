let vi=0, ans={}, done=false;

function key(qn){return vi+'-'+qn;}

function render(){
  const v=V[vi];
  let answered=v.qs.filter(q=>ans[key(q.n)]!==undefined).length;
  let score=0;
  if(done) v.qs.forEach(q=>{if(ans[key(q.n)]===q.a)score++;});

  let html='';

  html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;">';
  V.forEach((v2,i)=>{
    html+=`<button class="vbtn${i===vi?' active':''}" onclick="switchV(${i})">Вариант ${v2.id}</button>`;
  });
  html+='<span style="margin-left:auto;font-size:12px;color:var(--color-text-secondary);">20 заданий · 60 мин · 100 баллов</span>';
  html+='</div>';

  let prevSec='';
  v.qs.forEach(q=>{
    const k=key(q.n);
    const chosen=ans[k];
    const sm=SM[q.s];

    if(q.s!==prevSec){
      prevSec=q.s;
      html+=`<div class="sec-badge" style="background:${sm.bg};color:${sm.fg};">${q.s}</div>`;
    }

    let cardCls='qcard';
    if(done){
      if(chosen===q.a) cardCls+=' ok';
      else if(chosen!==undefined) cardCls+=' err';
      else cardCls+=' skip';
    }

    html+=`<div class="${cardCls}">`;
    html+=`<p style="margin:0 0 .6rem;font-size:14px;color:var(--color-text-primary);font-weight:500;line-height:1.5;"><span style="color:var(--color-text-secondary);font-weight:400;margin-right:6px;">${q.n}.</span>${q.q}</p>`;
    html+='<div style="display:flex;flex-direction:column;gap:5px;">';

    q.o.forEach((opt,oi)=>{
      const isCh=chosen===oi, isAns=q.a===oi;
      let cls='opt';
      if(done){
        cls+=(isAns?' ok': isCh?' err':'');
        cls+=' done';
      } else if(isCh){ cls+=' sel'; }

      const icon=done?(isAns?'<i class="ti ti-check" aria-hidden="true" style="margin-left:auto;flex-shrink:0;font-size:13px;"/>':isCh?'<i class="ti ti-x" aria-hidden="true" style="margin-left:auto;flex-shrink:0;font-size:13px;"/>':''):'';
      html+=`<div class="${cls}" ${done?'':'onclick="pick('+q.n+','+oi+')"'}>`;
      html+=`<span style="font-weight:500;min-width:18px;flex-shrink:0;">${L[oi]}</span><span>${opt}</span>${icon}`;
      html+='</div>';
    });

    html+='</div></div>';
  });

  html+='<div style="margin-top:1.25rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">';
  if(!done){
    html+=`<span style="font-size:13px;color:var(--color-text-secondary);">Отвечено: ${answered} / 20</span>`;
    html+=`<button class="vbtn" onclick="submit()" style="color:var(--color-text-primary);font-weight:500;">Проверить ответы ↗</button>`;
  } else {
    const good=score>=8;
    html+=`<div style="padding:10px 20px;border-radius:12px;background:${good?'var(--color-background-success)':'var(--color-background-danger)'};color:${good?'var(--color-text-success)':'var(--color-text-danger)'};font-size:15px;font-weight:500;">${score*5} баллов из 100 &nbsp;·&nbsp; верно: ${score} / 20</div>`;
    const medal=score>=16?'Отлично!':score>=12?'Хороший результат':'Нужно повторить материал';
    const mc=score>=16?'var(--color-text-success)':score>=12?'var(--color-text-warning)':'var(--color-text-danger)';
    html+=`<span style="font-size:13px;color:${mc};">${medal}</span>`;
    html+=`<button class="vbtn" onclick="resetV()"><i class="ti ti-refresh" aria-hidden="true"></i> Начать заново</button>`;
  }
  html+='</div>';

  document.getElementById('app').innerHTML=html;
}

function switchV(i){vi=i;ans={};done=false;render();}
function pick(qn,oi){if(done)return;ans[key(qn)]=oi;render();}
function submit(){done=true;render();}
function resetV(){done=false;ans={};render();}

render();
</script>
